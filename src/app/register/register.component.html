<div class="login-container">
  <h2>Register</h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

    <!-- Name -->
    <div class="form-group">
      <label>Name</label>
      <input type="text" formControlName="name" placeholder="Enter name" />
      <small *ngIf="submitted && f['name'].errors?.['required']">
        Name required
      </small>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="Enter email" />
      <small *ngIf="submitted && f['email'].errors?.['required']">
        Email required
      </small>
      <small *ngIf="submitted && f['email'].errors?.['email']">
        Invalid email
      </small>
    </div>

    <!-- Password -->
       <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" placeholder="Enter password" />
      <small *ngIf="submitted && f['password'].errors?.['required']">
        Password required
      </small>
      <small *ngIf="submitted && f['password'].errors?.['minlength']">
        Minimum 8 characters
      </small>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" formControlName="confirmPassword" placeholder="Confirm password" />
      <small *ngIf="submitted && registerForm.errors?.['mismatch']">
        Passwords do not match
      </small>
    </div>

    <button type="submit">Register</button>

  </form>

  <p class="register-text">
    Already have an account?
      <a routerLink="/login">
        login
      </a>
  </p>
</div>
